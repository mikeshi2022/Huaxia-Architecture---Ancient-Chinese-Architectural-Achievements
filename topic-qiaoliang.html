<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桥梁专题 - 华夏营造</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <nav class="nav-tabs">
      <a href="index.html" class="nav-item">首页</a>
      <a href="dashboard.html" class="nav-item">数据大屏</a>
      <a href="topics.html" class="nav-item active">四大专题</a>
      <a href="craft.html" class="nav-item">建筑工艺</a>
      <a href="timeline.html" class="nav-item">朝代时间轴</a>
      <a href="overview.html" class="nav-item">营造拾趣</a>
      <a href="ai-chat.html" class="nav-item">营造助手</a>
    </nav>
    <div class="header-content">
      <h1>华夏营造</h1>
      <p class="subtitle">桥梁专题 · 古代桥梁技术与工程智慧</p>
    </div>
  </header>

  <main class="main-wrapper">
    <div class="topic-header">
      <h2>桥梁建筑</h2>
      <p>赵州桥、卢沟桥、广济桥、洛阳桥……从石拱到木拱、从梁桥到铁索，中国古代桥梁技术领先世界</p>
    </div>
    <div class="topic-layout">
      <div class="topic-chart">
        <div class="panel-title"><span class="title-icon">◆</span> 桥型分类</div>
        <div id="topicChart" style="height: 260px;"></div>
      </div>
      <div class="topic-list" id="topicList"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-center">数据来源：《营造法式》《清式营造则例》及各地文物保护名录</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="js/data.js"></script>
  <script>
    const data = QIAOLIANG_DATA;
    const colors = ['#5b8fc4', '#4a9c82', '#d4a84b', '#c41e3a', '#8b6b9e', '#e07c54', '#50a090'];
    const subtypeCount = {};
    data.forEach(d => {
      subtypeCount[d.subtype] = (subtypeCount[d.subtype] || 0) + 1;
    });
    const pieData = Object.entries(subtypeCount).map(([name, value], i) => ({ name, value, itemStyle: { color: colors[i % colors.length] } }));
    const chart = echarts.init(document.getElementById('topicChart'));
    chart.setOption({
      tooltip: { trigger: 'item' },
      series: [{ type: 'pie', radius: '65%', data: pieData, itemStyle: { borderColor: '#1a1a1a', borderWidth: 2 }, label: { color: '#f5f0e6' } }]
    });
    document.getElementById('topicList').innerHTML = data.map(d => `
      <a href="detail.html?name=${encodeURIComponent(d.name)}" class="topic-card">
        <span class="card-name">${d.name}</span>
        <span class="card-info">${d.subtype} · ${d.location} · ${d.length ? d.length + 'm' : d.era}</span>
      </a>
    `).join('');
  </script>
</body>
</html>
