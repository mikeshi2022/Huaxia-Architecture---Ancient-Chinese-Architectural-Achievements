<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>皇宫专题 - 华夏营造</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <nav class="nav-tabs">
      <a href="index.html" class="nav-item">首页</a>
      <a href="dashboard.html" class="nav-item">数据大屏</a>
      <a href="topics.html" class="nav-item active">四大专题</a>
      <a href="craft.html" class="nav-item">建筑工艺</a>
      <a href="timeline.html" class="nav-item">朝代时间轴</a>
      <a href="overview.html" class="nav-item">营造拾趣</a>
      <a href="ai-chat.html" class="nav-item">营造助手</a>
    </nav>
    <div class="header-content">
      <h1>华夏营造</h1>
      <p class="subtitle">皇宫专题 · 皇家建筑与最高营造技艺</p>
    </div>
  </header>

  <main class="main-wrapper">
    <div class="topic-header">
      <h2>皇宫建筑</h2>
      <p>北京故宫、沈阳故宫、承德避暑山庄等代表中国古代建筑的最高成就，斗拱、琉璃瓦、中轴对称体现礼制与威严</p>
    </div>
    <div class="topic-layout">
      <div class="topic-chart">
        <div class="panel-title"><span class="title-icon">◆</span> 建筑面积对比（万㎡）</div>
        <div id="topicChart" style="height: 260px;"></div>
      </div>
      <div class="topic-list" id="topicList"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-center">数据来源：《营造法式》《清式营造则例》及各地文物保护名录</div>
    <div class="footer-map-attribution">中国界省级示意底图数据来自 geo.datav.aliyun.com（阿里云 DataV）。互联网地图审图号以地图服务方公示为准：<a href="https://a.amap.com/pc/static/page/info.html" target="_blank" rel="noopener noreferrer">GS(2024)1158号</a>（高德地图资质页，请以官方最新公示为准）。</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="js/data.js"></script>
  <script>
    const data = HUANGONG_DATA.filter(d => d.area > 0);
    const chart = echarts.init(document.getElementById('topicChart'));
    chart.setOption({
      tooltip: { trigger: 'axis' },
      grid: { left: 80, right: 20, top: 20, bottom: 40 },
      xAxis: { type: 'value', axisLabel: { color: '#8b7355' }, splitLine: { lineStyle: { color: 'rgba(212,168,75,0.15)' } } },
      yAxis: { type: 'category', data: data.map(d => d.name), axisLabel: { color: '#f5f0e6' } },
      series: [{ type: 'bar', data: data.map(d => d.area), itemStyle: { color: '#d4a84b' }, barMaxWidth: 24 }]
    });
    document.getElementById('topicList').innerHTML = HUANGONG_DATA.map(d => `
      <a href="detail.html?name=${encodeURIComponent(d.name)}" class="topic-card">
        <span class="card-name">${d.name}</span>
        <span class="card-info">${d.subtype} · ${d.location} · ${d.area ? d.area + '万㎡' : d.era}</span>
      </a>
    `).join('');
  </script>
</body>
</html>
